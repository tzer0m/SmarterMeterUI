name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop service
        run: sudo systemctl stop SmarterMeterUI.service

      - name: Publish
        run: dotnet publish SmarterMeterUI/SmarterMeterUI.csproj -c Release -o /home/tzer0m/Services/SmarterMeterUI

      - name: Start service
        run: sudo systemctl start SmarterMeterUI.service

      - name: Check status
        run: sudo systemctl status SmarterMeterUI.service --no-pager
